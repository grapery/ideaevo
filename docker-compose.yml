services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: wanye
      MYSQL_DATABASE: wanye
      MYSQL_USER: wanye
      MYSQL_PASSWORD: wanye
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uwanye", "-pwanye"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: wanye
      DB_PASSWORD: wanye
      DB_NAME: wanye
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 8080
      # —— LLM（留空降级为 Mock 回复）——
      LLM_API_KEY: ${LLM_API_KEY:-}
      ARK_API_KEY: ${ARK_API_KEY:-}
      HUOSHAN_API_KEY: ${HUOSHAN_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      ARK_BASE_URL: ${ARK_BASE_URL:-}
      HUOSHAN_BASE_URL: ${HUOSHAN_BASE_URL:-}
      HUOSHAN_TEXT_MODEL: ${HUOSHAN_TEXT_MODEL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      ARK_MODEL: ${ARK_MODEL:-}
      HUOSHAN_MODEL: ${HUOSHAN_MODEL:-}
      SYSTEM_AGENT_ID: ${SYSTEM_AGENT_ID:-}
      # —— 阿里云 OSS 向量 Bucket（留空降级为 MySQL LIKE 检索）——
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      ALIYUN_VECTOR_BUCKET: ${ALIYUN_VECTOR_BUCKET:-}
      ALIYUN_VECTOR_REGION: ${ALIYUN_VECTOR_REGION:-cn-shanghai}
      ALIYUN_VECTOR_ACCOUNT_ID: ${ALIYUN_VECTOR_ACCOUNT_ID:-}
      VECTOR_INDEX_IDEAS: ${VECTOR_INDEX_IDEAS:-ideas}
      # —— DashScope Embedding（留空则向量检索不启用）——
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      # —— 微信开放平台扫码登录 ——
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_REDIRECT_URL: ${WECHAT_REDIRECT_URL:-}
      # —— 用户资源 OSS（头像/背景上传）——
      ALIYUN_ASSETS_BUCKET: ${ALIYUN_ASSETS_BUCKET:-}
      ALIYUN_ASSETS_REGION: ${ALIYUN_ASSETS_REGION:-cn-shanghai}
      ALIYUN_ASSETS_CDN_DOMAIN: ${ALIYUN_ASSETS_CDN_DOMAIN:-}
      # —— 阿里云短信 OTP（与 grapery 一致）——
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME:-}
      ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE:-}
      ALIYUN_SMS_REGION: ${ALIYUN_SMS_REGION:-cn-hangzhou}
      ALIYUN_SMS_ENDPOINT: ${ALIYUN_SMS_ENDPOINT:-}
      ALIYUN_SMS_USE_DEFAULT_CREDENTIAL: ${ALIYUN_SMS_USE_DEFAULT_CREDENTIAL:-}
      ALIYUN_SMS_ACCESS_KEY_ID: ${ALIYUN_SMS_ACCESS_KEY_ID:-}
      ALIYUN_SMS_ACCESS_KEY_SECRET: ${ALIYUN_SMS_ACCESS_KEY_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mysqldata:
