name: MCP CI/CD

# MCP 服务（基于 Model Context Protocol 的工具接入层）。
# 与 API 共用 backend/Dockerfile（同一镜像内含 api + mcp 两个二进制），
# 通过 --build-arg SERVICE=mcp 区分。运行时仍可通过 docker-compose 的 command 覆盖。
#
# Repository Variables：与 api-ci.yml 一致（ACR_*, DB_*, JWT_SECRET …）。

on:
  push:
    paths:
      - 'backend/cmd/mcp/**'
      - 'backend/internal/**'
      - 'backend/pkg/**'
      - 'backend/go.mod'
      - 'backend/go.sum'
      - 'backend/Dockerfile'
      - '.github/workflows/mcp-ci.yml'
    branches:
      - main
      - develop
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/mcp-ci.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  GO_VERSION: '1.25'
  REGISTRY: ${{ vars.ACR_REGISTRY || 'crpi-kz6w8hb0pa94yvgy.cn-hangzhou.personal.cr.aliyuncs.com' }}
  IMAGE_NAME: ideaevo-mcp
  SERVICE_NAME: mcp

jobs:
  # ========================================
  # 构建（vet + 编译，不跑 DB 测试）
  # ========================================
  build:
    name: Build MCP
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download deps
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build binary
        run: |
          VERSION=$(echo ${{ github.sha }} | cut -c1-7)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.CommitSHA=${{ github.sha }} -X main.BuildTime=${BUILD_TIME}" \
            -o ./bin/${{ env.SERVICE_NAME }} ./cmd/${{ env.SERVICE_NAME }}
          echo "✅ Build completed"
          ls -lh ./bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ideaevo-${{ env.SERVICE_NAME }}
          path: backend/bin/${{ env.SERVICE_NAME }}
          retention-days: 7

  # ========================================
  # Docker 构建推送 - Develop
  # ========================================
  docker-develop:
    name: Docker Build (Develop)
    runs-on: ubuntu-latest
    needs: build
    environment: development
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    env:
      TAG: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
          ACR_PASSWORD: ${{ vars.ACR_PASSWORD }}
        run: |
          echo "Logging in to ${ACR_REGISTRY} as ${ACR_USERNAME}"
          echo "${ACR_PASSWORD}" | docker login "${ACR_REGISTRY}" -u "${ACR_USERNAME}" --password-stdin

      - name: Build & Push Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            --build-arg VERSION=dev-${{ github.sha }} \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            --build-arg BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg SERVICE=${{ env.SERVICE_NAME }} \
            -t ${{ env.REGISTRY }}/ideaevo-dev/${{ env.IMAGE_NAME }}:${{ env.TAG }} \
            ./backend
          docker push ${{ env.REGISTRY }}/ideaevo-dev/${{ env.IMAGE_NAME }}:${{ env.TAG }}

      - name: Deploy notification
        run: |
          echo "## 🚀 Development Docker Image - MCP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ env.SERVICE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/ideaevo-dev/${{ env.IMAGE_NAME }}:dev\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | development |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

  # ========================================
  # Docker 构建推送 - Production
  # ========================================
  docker-production:
    name: Docker Build (Production)
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    env:
      TAG: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
          ACR_PASSWORD: ${{ vars.ACR_PASSWORD }}
        run: |
          echo "Logging in to ${ACR_REGISTRY} as ${ACR_USERNAME}"
          echo "${ACR_PASSWORD}" | docker login "${ACR_REGISTRY}" -u "${ACR_USERNAME}" --password-stdin

      - name: Build & Push Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            --build-arg VERSION=${{ github.sha }} \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            --build-arg BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg SERVICE=${{ env.SERVICE_NAME }} \
            -t ${{ env.REGISTRY }}/ideaevo-prod/${{ env.IMAGE_NAME }}:${{ env.TAG }} \
            ./backend
          docker push ${{ env.REGISTRY }}/ideaevo-prod/${{ env.IMAGE_NAME }}:${{ env.TAG }}

      - name: Deploy notification
        run: |
          echo "## 🚀 Production Docker Image - MCP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ env.SERVICE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/ideaevo-prod/${{ env.IMAGE_NAME }}:prod\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | production |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
