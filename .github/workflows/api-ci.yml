name: API CI/CD

# 后端 API 服务：构建 + 测试（MySQL）+ Docker 镜像构建推送（dev / prod）
#
# Repository Variables（Settings → Secrets and variables → Actions → Variables）:
#   ACR_REGISTRY, ACR_USERNAME, ACR_PASSWORD            — 阿里云容器镜像服务
#   DB_*（DB_USER / DB_PASSWORD / DB_NAME_DEV / DB_NAME_PROD）、JWT_SECRET …
#   ALIYUN_SMS_SIGN_NAME / ALIYUN_SMS_TEMPLATE_CODE     — 短信签名与模板（可与 grapery 共用）
#   ALIYUN_SMS_ACCESS_ID / ALIYUN_SMS_ACCESS_SECRET     — SMS RAM 子账号（写入容器 ALIYUN_SMS_ACCESS_KEY_*）
#   ALIYUN_SMS_REGION / ALIYUN_SMS_ENDPOINT             — 可选，默认 cn-hangzhou / dysmsapi.aliyuncs.com
#
# 部署主机配置（如后续接 SSH 部署）：
#   DEV_DEPLOY_HOST / PROD_DEPLOY_HOST、SSH_USER、SSH_KEY

on:
  push:
    paths:
      - 'backend/cmd/api/**'
      - 'backend/internal/**'
      - 'backend/pkg/**'
      - 'backend/go.mod'
      - 'backend/go.sum'
      - 'backend/Dockerfile'
      - '.github/workflows/api-ci.yml'
    branches:
      - main
      - develop
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/api-ci.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  GO_VERSION: '1.25'
  REGISTRY: ${{ vars.ACR_REGISTRY || 'crpi-kz6w8hb0pa94yvgy.cn-hangzhou.personal.cr.aliyuncs.com' }}
  IMAGE_NAME: ideaevo-api
  SERVICE_NAME: api

jobs:
  # ========================================
  # 构建 + 测试（带 MySQL service container）
  # ========================================
  build:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: wanye
          MYSQL_DATABASE: wanye_test
          MYSQL_USER: wanye
          MYSQL_PASSWORD: wanye
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uwanye -pwanye"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download deps
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -cover
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: wanye
          DB_PASSWORD: wanye
          DB_NAME: wanye_test
          DB_SSLMODE: disable
          JWT_SECRET: ci-test-secret
          # 向量检索：CI 不连真实阿里云，自动降级到 MySQL LIKE 检索
          ALIYUN_VECTOR_BUCKET: ""
          DASHSCOPE_API_KEY: ""

      - name: Build binary
        run: |
          VERSION=$(echo ${{ github.sha }} | cut -c1-7)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.CommitSHA=${{ github.sha }} -X main.BuildTime=${BUILD_TIME}" \
            -o ./bin/api ./cmd/api
          echo "✅ Build completed"
          ls -lh ./bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ideaevo-${{ env.SERVICE_NAME }}
          path: backend/bin/${{ env.SERVICE_NAME }}
          retention-days: 7

  # ========================================
  # Docker 构建推送 - Develop
  # ========================================
  docker-develop:
    name: Docker Build (Develop)
    runs-on: ubuntu-latest
    needs: build
    environment: development
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    env:
      TAG: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
          ACR_PASSWORD: ${{ vars.ACR_PASSWORD }}
        run: |
          echo "Logging in to ${ACR_REGISTRY} as ${ACR_USERNAME}"
          echo "${ACR_PASSWORD}" | docker login "${ACR_REGISTRY}" -u "${ACR_USERNAME}" --password-stdin

      - name: Build & Push Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            --build-arg VERSION=dev-${{ github.sha }} \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            --build-arg BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg SERVICE=${{ env.SERVICE_NAME }} \
            -t ${{ env.REGISTRY }}/grapery-dev/${{ env.IMAGE_NAME }}:${{ env.TAG }} \
            ./backend
          docker push ${{ env.REGISTRY }}/grapery-dev/${{ env.IMAGE_NAME }}:${{ env.TAG }}

      - name: Deploy notification
        run: |
          echo "## 🚀 Development Docker Image - API" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ env.SERVICE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/grapery-dev/${{ env.IMAGE_NAME }}:dev\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | development |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### vars Status" >> $GITHUB_STEP_SUMMARY
          echo "- ACR_REGISTRY: ${{ vars.ACR_REGISTRY && '✅ Set' || '❌ Not Set' }}" >> $GITHUB_STEP_SUMMARY
          echo "- DB_PASSWORD: ${{ vars.DB_PASSWORD && '✅ Set' || '❌ Not Set' }}" >> $GITHUB_STEP_SUMMARY
          echo "- JWT_SECRET: ${{ vars.JWT_SECRET && '✅ Set' || '❌ Not Set' }}" >> $GITHUB_STEP_SUMMARY
          echo "- ALIYUN_SMS_SIGN_NAME: ${{ vars.ALIYUN_SMS_SIGN_NAME != '' && '✅ Set' || '⚠️ Use code default' }}" >> $GITHUB_STEP_SUMMARY
          echo "- ALIYUN_SMS_TEMPLATE_CODE: ${{ vars.ALIYUN_SMS_TEMPLATE_CODE != '' && '✅ Set' || '⚠️ Use code default' }}" >> $GITHUB_STEP_SUMMARY
          echo "- ALIYUN_SMS_ACCESS_ID: ${{ vars.ALIYUN_SMS_ACCESS_ID != '' && '✅ Set' || '❌ Missing' }}" >> $GITHUB_STEP_SUMMARY
          echo "- ALIYUN_SMS_USE_DEFAULT_CREDENTIAL: 1 (fixed in deploy .env)" >> $GITHUB_STEP_SUMMARY

  # ========================================
  # Docker 构建推送 - Production
  # ========================================
  docker-production:
    name: Docker Build (Production)
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    env:
      TAG: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
          ACR_PASSWORD: ${{ vars.ACR_PASSWORD }}
        run: |
          echo "Logging in to ${ACR_REGISTRY} as ${ACR_USERNAME}"
          echo "${ACR_PASSWORD}" | docker login "${ACR_REGISTRY}" -u "${ACR_USERNAME}" --password-stdin

      - name: Build & Push Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            --build-arg VERSION=${{ github.sha }} \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            --build-arg BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg SERVICE=${{ env.SERVICE_NAME }} \
            -t ${{ env.REGISTRY }}/grapery-prod/${{ env.IMAGE_NAME }}:${{ env.TAG }} \
            ./backend
          docker push ${{ env.REGISTRY }}/grapery-prod/${{ env.IMAGE_NAME }}:${{ env.TAG }}

      - name: Deploy notification
        run: |
          echo "## 🚀 Production Docker Image - API" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ env.SERVICE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/grapery-prod/${{ env.IMAGE_NAME }}:prod\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | production |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### vars Status" >> $GITHUB_STEP_SUMMARY
          echo "- ACR_REGISTRY: ${{ vars.ACR_REGISTRY && '✅ Set' || '❌ Not Set' }}" >> $GITHUB_STEP_SUMMARY
          echo "- DB_PASSWORD: ${{ vars.DB_PASSWORD && '✅ Set' || '❌ Not Set' }}" >> $GITHUB_STEP_SUMMARY
          echo "- JWT_SECRET: ${{ vars.JWT_SECRET && '✅ Set' || '❌ Not Set' }}" >> $GITHUB_STEP_SUMMARY
          echo "- ALIYUN_SMS_SIGN_NAME: ${{ vars.ALIYUN_SMS_SIGN_NAME != '' && '✅ Set' || '⚠️ Use code default' }}" >> $GITHUB_STEP_SUMMARY
          echo "- ALIYUN_SMS_TEMPLATE_CODE: ${{ vars.ALIYUN_SMS_TEMPLATE_CODE != '' && '✅ Set' || '⚠️ Use code default' }}" >> $GITHUB_STEP_SUMMARY
          echo "- ALIYUN_SMS_ACCESS_ID: ${{ vars.ALIYUN_SMS_ACCESS_ID != '' && '✅ Set' || '❌ Missing' }}" >> $GITHUB_STEP_SUMMARY
          echo "- ALIYUN_SMS_USE_DEFAULT_CREDENTIAL: 1 (fixed in deploy .env)" >> $GITHUB_STEP_SUMMARY

  # ========================================
  # SSH 部署 - Develop（拉镜像 + docker compose up）
  # ========================================
  deploy-develop:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: docker-develop
    environment: development
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    env:
      DEPLOY_DIR: /opt/ideaevo-dev
      API_IMAGE: ${{ vars.ACR_REGISTRY }}/grapery-dev/ideaevo-api:dev
      WEB_IMAGE: ${{ vars.ACR_REGISTRY }}/grapery-dev/ideaevo-web:dev
      ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Format SSH key
        # vars.SSH_KEY may be stored as a single line with space-separated PEM
        # chunks (newlines lost on paste). Reconstruct a valid multi-line PEM.
        env:
          RAW_SSH_KEY: ${{ vars.SSH_KEY }}
        run: |
          python3 - <<'PY'
          import os, re
          raw = os.environ["RAW_SSH_KEY"].strip()
          m = re.match(r"-----BEGIN ([A-Z ]+)-----\s+(.*?)\s+-----END ([A-Z ]+)-----", raw, re.S)
          if not m:
              # already multi-line or unknown; write as-is
              open(os.environ["GITHUB_WORKSPACE"] + "/ssh_key", "w").write(raw + "\n")
          else:
              body = m.group(2).replace(" ", "").replace("\n", "")
              wrapped = "\n".join(body[i:i+64] for i in range(0, len(body), 64))
              pem = f"-----BEGIN {m.group(1).strip()}-----\n{wrapped}\n-----END {m.group(3).strip()}-----\n"
              open(os.environ["GITHUB_WORKSPACE"] + "/ssh_key", "w").write(pem)
          os.chmod(os.environ["GITHUB_WORKSPACE"] + "/ssh_key", 0o600)
          PY

      - name: Generate .env for server
        env:
          DB_ADDRESS: ${{ vars.DB_ADDRESS }}
          DB_USERNAME: ${{ vars.DB_USERNAME }}
          DB_PASSWORD: ${{ vars.DB_PASSWORD }}
          JWT_SECRET: ${{ vars.JWT_SECRET }}
          DASHSCOPE_API_KEY: ${{ vars.DASHSCOPE_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          ALIYUN_SMS_SIGN_NAME: ${{ vars.ALIYUN_SMS_SIGN_NAME }}
          ALIYUN_SMS_TEMPLATE_CODE: ${{ vars.ALIYUN_SMS_TEMPLATE_CODE }}
          ALIYUN_SMS_REGION: ${{ vars.ALIYUN_SMS_REGION }}
          ALIYUN_SMS_ENDPOINT: ${{ vars.ALIYUN_SMS_ENDPOINT }}
          ALIYUN_SMS_ACCESS_ID: ${{ vars.ALIYUN_SMS_ACCESS_ID }}
          ALIYUN_SMS_ACCESS_SECRET: ${{ vars.ALIYUN_SMS_ACCESS_SECRET }}
        run: |
          mkdir -p deploy
          SMS_REGION="${ALIYUN_SMS_REGION:-cn-hangzhou}"
          {
            echo "DB_HOST=${DB_ADDRESS}"
            echo "DB_PORT=3306"
            echo "DB_USER=${DB_USERNAME}"
            echo "DB_PASSWORD=${DB_PASSWORD}"
            echo "DB_NAME=ideaevo_dev"
            echo "PORT=8080"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "JWT_EXPIRY=24h"
            echo "LLM_API_KEY=${DASHSCOPE_API_KEY}"
            echo "LLM_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1"
            echo "LLM_MODEL=qwen-plus"
            echo "DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}"
            echo "FRONTEND_URL=http://121.40.176.39:3001"
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "API_URL=http://api:8080"
            echo "ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME}"
            echo "ALIYUN_SMS_TEMPLATE_CODE=${ALIYUN_SMS_TEMPLATE_CODE}"
            echo "ALIYUN_SMS_REGION=${SMS_REGION}"
            echo "ALIYUN_SMS_ENDPOINT=${ALIYUN_SMS_ENDPOINT}"
            echo "ALIYUN_SMS_USE_DEFAULT_CREDENTIAL=1"
            echo "ALIYUN_SMS_ACCESS_KEY_ID=${ALIYUN_SMS_ACCESS_ID}"
            echo "ALIYUN_SMS_ACCESS_KEY_SECRET=${ALIYUN_SMS_ACCESS_SECRET}"
          } > deploy/.env

      - name: Copy compose + .env to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ vars.DEV_DEPLOY_HOST }}
          username: ${{ vars.SSH_USER }}
          key_path: ${{ github.workspace }}/ssh_key
          source: "docker-compose.server.yml,deploy/.env"
          target: ${{ env.DEPLOY_DIR }}
          overwrite: true

      - name: Deploy via docker compose
        uses: appleboy/ssh-action@v0.1.10
        env:
          API_IMAGE: ${{ env.API_IMAGE }}
          WEB_IMAGE: ${{ env.WEB_IMAGE }}
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
          ACR_PASSWORD: ${{ vars.ACR_PASSWORD }}
          DB_ADDRESS: ${{ vars.DB_ADDRESS }}
          DB_ROOT_USER: ${{ vars.DB_USERNAME }}
          DB_ROOT_PASSWORD: ${{ vars.DB_PASSWORD }}
        with:
          host: ${{ vars.DEV_DEPLOY_HOST }}
          username: ${{ vars.SSH_USER }}
          key_path: ${{ github.workspace }}/ssh_key
          envs: API_IMAGE,WEB_IMAGE,ACR_REGISTRY,ACR_USERNAME,ACR_PASSWORD,DB_ADDRESS,DB_ROOT_USER,DB_ROOT_PASSWORD
          script: |
            # 幂等创建独立库 ideaevo_dev（宿主机 MySQL 是原生服务，监听 127.0.0.1:3306）
            mysql -h"$DB_ADDRESS" -u"$DB_ROOT_USER" -p"$DB_ROOT_PASSWORD" \
              -e "CREATE DATABASE IF NOT EXISTS ideaevo_dev DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;" \
              2>/dev/null && echo "✅ database ideaevo_dev ready" || echo "⚠️ database create skipped (mysql cli missing or auth failed — assume exists)"
            mkdir -p ${{ env.DEPLOY_DIR }}
            cd ${{ env.DEPLOY_DIR }}
            echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin
            [ -f deploy/.env ] && mv -f deploy/.env .env
            export API_IMAGE="$API_IMAGE"
            export WEB_IMAGE="$WEB_IMAGE"
            docker compose -f docker-compose.server.yml -p ideaevo-dev pull api
            docker compose -f docker-compose.server.yml -p ideaevo-dev up -d api
            sleep 12
            echo "=== container status ==="
            docker ps -a --filter "name=ideaevo-api" --format "{{.Names}}\t{{.Status}}"
            echo "=== last logs ==="
            docker logs ideaevo-api --tail 10 2>&1 || true
            docker compose -f docker-compose.server.yml -p ideaevo-dev ps
            curl -sf http://localhost:8090/health && echo "✅ api healthy" || echo "⚠️ api health check failed"

      - name: Deploy notification
        run: |
          echo "## 🚀 Deployed API to Development" >> $GITHUB_STEP_SUMMARY
          echo "- Host: \`${{ vars.DEV_DEPLOY_HOST }}:8090\`" >> $GITHUB_STEP_SUMMARY
          echo "- Health: http://${{ vars.DEV_DEPLOY_HOST }}:8090/health" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.API_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
